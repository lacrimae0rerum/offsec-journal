# OffSec Journal — PROD compose (standalone).
#
# Serves the app behind the lab perimeter: nginx + Authelia on the bastion does
# forward-auth and proxies to this host on :8080, passing the authenticated user
# in the Remote-User header. Runs in PRODUCTION mode (no DEV_USER): Authelia is
# the auth perimeter and require_authelia enforces the trusted-proxy check.
#
# Config comes from .env. The relevant keys for prod:
#   DEV_USER            -> leave UNSET/commented (setting it bypasses Authelia)
#   SINGLE_TENANT_MODE  -> true to auto-provision the Authelia Remote-User
#   TRUSTED_PROXY_IPS   -> CSV of EXACT IPs allowed to present Remote-User.
#                          Behind docker's bridge NAT the app sees the bridge
#                          gateway (172.x.0.1), NOT the bastion IP. If the first
#                          request logs `untrusted_proxy`, add the client_ip it
#                          reports here:
#                            docker compose -f docker-compose.prod.yml logs app | grep untrusted_proxy
#
# Usage (on the host nginx proxies to):
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Do NOT use plain `docker compose up` here: that loads docker-compose.yml (dev),
# which binds loopback-only AND bypasses Authelia.

services:
  app:
    build: .
    image: offsec-journal:prod
    container_name: offsec-journal
    restart: unless-stopped
    ports:
      - "8080:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./notes:/app/notes
