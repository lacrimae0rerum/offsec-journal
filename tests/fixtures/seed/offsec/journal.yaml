# data/journal.yaml — append-only write path para TODAS las mutaciones
# estructurales. LLM propone con proposer=llm, humano propone con proposer=human.
# Aplicar/rechazar se hace desde /journal (UI) o CLI. Cada apply crea .bak del
# YAML afectado antes de mutar; si ruamel falla el apply, el backend restaura.
#
# Campos:
#   id              ULID (26 chars)
#   timestamp       ISO-8601 UTC de creación de la propuesta
#   proposer        llm | human
#   kind            assign | unassign | availability | skill_update |
#                   person_create | person_update | person_archive |
#                   project_create | project_update | project_archive |
#                   client_create | client_update | client_archive |
#                   contact_add | contact_update | contact_remove |
#                   office_create | office_update | office_archive |
#                   skill_label_update
#   payload         dict tipado por kind
#   status          pending | applied | rejected
#   applied_at      ISO-8601 UTC cuando se aplica (opcional)
#   applied_by      user id (opcional)
#   rejected_reason texto cuando status=rejected

